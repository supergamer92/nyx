name: Build Nyx OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build Arch Linux-based Nyx OS ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain inside Arch container to compile binaries for ISO
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/workspace" \
            -v /dev:/dev \
            -w /workspace \
            archlinux:latest \
            /bin/bash -c "
              set -ex
              echo '==> Initializing loop devices...'
              for i in \$(seq 0 15); do
                if [ ! -b /dev/loop\$i ]; then
                  mknod -m 660 /dev/loop\$i b 7 \$i || true
                fi
              done
              
              echo '==> Updating pacman keys & packages...'
              pacman -Sy --noconfirm archlinux-keyring || true
              pacman-key --init || true
              pacman-key --populate archlinux || true
              pacman -Syu --noconfirm archiso git sudo rust cargo pkg-config wayland wayland-protocols libinput systemd mesa libxkbcommon pixman
              
              echo '==> Building Nyx binaries for live environment...'
              cargo build --release -p nyx-shell -p nyx-settingsd -p nyx-hw -p nyx-updater
              
              echo '==> Preparing ISO build environment...'
              mkdir -p /tmp/nyx-iso-build /workspace/out
              cp -r /usr/share/archiso/configs/releng/* /tmp/nyx-iso-build/
              
              echo '==> Applying Nyx base package list...'
              grep -v '^#' /workspace/nyx-base/packages.txt | grep -v '^$' >> /tmp/nyx-iso-build/packages.x86_64
              
              echo '==> Installing Nyx binaries into live filesystem...'
              mkdir -p /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-shell /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-settingsd /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-hw /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-updater /tmp/nyx-iso-build/airootfs/usr/bin/
              
              echo '==> Configuring automatic GUI desktop boot (graphical.target)...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/multi-user.target.wants/
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/getty@tty1.service.d/
              
              cat << 'EOF' > /tmp/nyx-iso-build/airootfs/etc/systemd/system/nyx-desktop.service
          [Unit]
          Description=Nyx OS Desktop Shell
          After=network.target sound.target

          [Service]
          Type=simple
          User=root
          Environment=WAYLAND_DISPLAY=wayland-0
          ExecStart=/usr/bin/nyx-shell
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

              ln -sf /etc/systemd/system/nyx-desktop.service /tmp/nyx-iso-build/airootfs/etc/systemd/system/multi-user.target.wants/nyx-desktop.service

              cat << 'EOF' > /tmp/nyx-iso-build/airootfs/etc/systemd/system/getty@tty1.service.d/autologin.conf
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin root --noclear %I \$TERM
          EOF

              echo '==> Assembling bootable ISO...'
              mkarchiso -v -w /tmp/nyx-iso-work -o /workspace/out /tmp/nyx-iso-build
              
              echo '==> Build completed successfully!'
              ls -la /workspace/out
            "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyx-os-iso
          path: out/*.iso
          retention-days: 7
