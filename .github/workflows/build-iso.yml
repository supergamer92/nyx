name: Build Nyx OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build Arch Linux-based Nyx OS ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain inside Arch container to compile binaries for ISO
        run: |
          docker run -i --rm --privileged \
            -v "${{ github.workspace }}:/workspace" \
            -v /dev:/dev \
            -w /workspace \
            archlinux:latest \
            /bin/bash << 'DOCKEREOF'
              set -ex
              echo '==> Initializing loop devices...'
              for i in $(seq 0 15); do
                if [ ! -b /dev/loop$i ]; then
                  mknod -m 660 /dev/loop$i b 7 $i || true
                fi
              done
              
              echo '==> Initializing pacman keys...'
              pacman-key --init || true
              pacman-key --populate archlinux || true
              
              echo '==> Upgrading keyring...'
              pacman -Sy --noconfirm archlinux-keyring || true
              
              echo '==> Installing required system packages...'
              pacman -Syu --noconfirm archiso git sudo rust pkg-config wayland wayland-protocols libinput systemd mesa libxkbcommon pixman seatd
              
              echo '==> Installing compatible libdisplay-info version (0.2.0) from Archive...'
              pacman -U --noconfirm https://archive.archlinux.org/packages/l/libdisplay-info/libdisplay-info-0.2.0-1-x86_64.pkg.tar.zst
              
              echo '==> Building Nyx shell binaries (compositor handled by cage)...'
              cargo build --release -p nyx-shell -p nyx-settingsd -p nyx-hw -p nyx-updater
              
              echo '==> Preparing ISO build environment...'
              mkdir -p /tmp/nyx-iso-build /workspace/out
              cp -r /usr/share/archiso/configs/releng/* /tmp/nyx-iso-build/
              cp /workspace/nyx-iso/profiledef.sh /tmp/nyx-iso-build/
              
              echo '==> Applying Nyx base package list...'
              grep -v '^#' /workspace/nyx-base/packages.txt | grep -v '^$' >> /tmp/nyx-iso-build/packages.x86_64
              
              echo '==> Installing Nyx binaries into live filesystem...'
              mkdir -p /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-shell /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-settingsd /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-hw /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-updater /tmp/nyx-iso-build/airootfs/usr/bin/
              
              # Set execution permissions
              chmod +x /tmp/nyx-iso-build/airootfs/usr/bin/nyx-*
              
              echo '==> Creating Desktop startup launcher...'
              cat << 'STARTEOF' > /tmp/nyx-iso-build/airootfs/usr/bin/nyx-start-desktop
              #!/bin/bash
              set -e
              exec > /tmp/nyx-desktop.log 2>&1
              echo "[nyx] Starting Nyx OS Desktop Session..."
              echo "[nyx] Date: $(date)"

              # Start the settings daemon in the background
              echo "[nyx] Starting nyx-settingsd..."
              /usr/bin/nyx-settingsd &

              # Use cage (kiosk Wayland compositor) to launch nyx-shell fullscreen.
              # cage handles all DRM/KMS setup and creates the Wayland display automatically.
              echo "[nyx] Launching cage with nyx-shell..."
              exec cage -s -- /usr/bin/nyx-shell
          STARTEOF
              chmod +x /tmp/nyx-iso-build/airootfs/usr/bin/nyx-start-desktop
              
              echo '==> Configuring automatic GUI desktop boot service...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/multi-user.target.wants/
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/getty@tty1.service.d/
              
              # Enable seatd for seat/session management (required by cage)
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/sockets.target.wants/
              ln -sf /usr/lib/systemd/system/seatd.service /tmp/nyx-iso-build/airootfs/etc/systemd/system/multi-user.target.wants/seatd.service
              
              cat << 'SVCEOF' > /tmp/nyx-iso-build/airootfs/etc/systemd/system/nyx-desktop.service
              [Unit]
              Description=Nyx OS Desktop GUI Session
              After=seatd.service systemd-logind.service
              Wants=seatd.service
              ConditionPathExists=/usr/bin/nyx-shell

              [Service]
              Type=simple
              User=root
              PAMName=login
              TTYPath=/dev/tty7
              StandardInput=tty
              StandardOutput=journal
              StandardError=journal
              UtmpIdentifier=tty7
              ExecStart=/usr/bin/nyx-start-desktop
              Restart=on-failure
              RestartSec=3
              Environment=XDG_RUNTIME_DIR=/run/user/0
              Environment=XDG_SESSION_TYPE=wayland
              Environment=WLR_LIBINPUT_NO_DEVICES=1

              [Install]
              WantedBy=multi-user.target
          SVCEOF

              ln -sf /etc/systemd/system/nyx-desktop.service /tmp/nyx-iso-build/airootfs/etc/systemd/system/multi-user.target.wants/nyx-desktop.service

              # Ensure XDG_RUNTIME_DIR exists for root
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/tmpfiles.d/
              echo 'd /run/user/0 0700 root root -' > /tmp/nyx-iso-build/airootfs/etc/tmpfiles.d/nyx-runtime.conf

              cat << 'EOF' > /tmp/nyx-iso-build/airootfs/etc/systemd/system/getty@tty1.service.d/autologin.conf
              [Service]
              ExecStart=
              ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
          EOF

              echo '==> Assembling bootable ISO...'
              mkarchiso -v -w /tmp/nyx-iso-work -o /workspace/out /tmp/nyx-iso-build
              
              echo '==> Build completed successfully!'
              ls -la /workspace/out
          DOCKEREOF


      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyx-os-iso
          path: out/*.iso
          retention-days: 7
