name: Build Nyx OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build Arch Linux-based Nyx OS ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain inside Arch container to compile binaries for ISO
        run: |
          docker run -i --rm --privileged \
            -v "${{ github.workspace }}:/workspace" \
            -v /dev:/dev \
            -w /workspace \
            archlinux:latest \
            /bin/bash << 'DOCKEREOF'
              set -ex
              echo '==> Initializing loop devices...'
              for i in $(seq 0 15); do
                if [ ! -b /dev/loop$i ]; then
                  mknod -m 660 /dev/loop$i b 7 $i || true
                fi
              done
              
              echo '==> Initializing pacman keys...'
              pacman-key --init || true
              pacman-key --populate archlinux || true
              
              echo '==> Upgrading keyring...'
              pacman -Sy --noconfirm archlinux-keyring || true
              
              echo '==> Installing required system packages...'
              pacman -Syu --noconfirm archiso git sudo rust pkg-config wayland wayland-protocols libinput systemd mesa libxkbcommon pixman seatd
              
              echo '==> Installing compatible libdisplay-info version (0.2.0) from Archive...'
              pacman -U --noconfirm https://archive.archlinux.org/packages/l/libdisplay-info/libdisplay-info-0.2.0-1-x86_64.pkg.tar.zst
              
              echo '==> Building Nyx shell binaries...'
              cargo build --release -p nyx-shell -p nyx-settingsd -p nyx-hw -p nyx-updater
              
              echo '==> Preparing ISO build environment...'
              mkdir -p /tmp/nyx-iso-build /workspace/out
              cp -r /usr/share/archiso/configs/releng/* /tmp/nyx-iso-build/
              cp /workspace/nyx-iso/profiledef.sh /tmp/nyx-iso-build/
              
              echo '==> Applying Nyx base package list...'
              grep -v '^#' /workspace/nyx-base/packages.txt | grep -v '^$' >> /tmp/nyx-iso-build/packages.x86_64
              
              echo '==> Installing Nyx binaries into live filesystem...'
              mkdir -p /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-shell /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-settingsd /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-hw /tmp/nyx-iso-build/airootfs/usr/bin/
              cp /workspace/target/release/nyx-updater /tmp/nyx-iso-build/airootfs/usr/bin/
              
              # Set execution permissions
              chmod +x /tmp/nyx-iso-build/airootfs/usr/bin/nyx-*
              
              echo '==> Creating live user (nyx) via sysusers.d...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/sysusers.d/
              cat << 'SYSEOF' > /tmp/nyx-iso-build/airootfs/etc/sysusers.d/nyx-live.conf
              u nyx - "Nyx OS Live User" /home/nyx /bin/bash
              m nyx wheel
          SYSEOF

              echo '==> Creating home directory via tmpfiles.d...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/tmpfiles.d/
              echo 'd /home/nyx 0700 nyx nyx -' > /tmp/nyx-iso-build/airootfs/etc/tmpfiles.d/nyx-home.conf

              echo '==> Configuring passwordless sudo for wheel group...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/sudoers.d/
              echo '%wheel ALL=(ALL:ALL) NOPASSWD: ALL' > /tmp/nyx-iso-build/airootfs/etc/sudoers.d/10-wheel

              echo '==> Configuring SDDM autologin to Plasma Wayland...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/sddm.conf.d/
              cat << 'SDDMEOF' > /tmp/nyx-iso-build/airootfs/etc/sddm.conf.d/autologin.conf
              [Autologin]
              User=nyx
              Session=plasma.desktop
          SDDMEOF

              echo '==> Enabling SDDM display manager...'
              mkdir -p /tmp/nyx-iso-build/airootfs/etc/systemd/system/
              ln -sf /usr/lib/systemd/system/sddm.service /tmp/nyx-iso-build/airootfs/etc/systemd/system/display-manager.service

              echo '==> Assembling bootable ISO...'
              mkarchiso -v -w /tmp/nyx-iso-work -o /workspace/out /tmp/nyx-iso-build
              
              echo '==> Build completed successfully!'
              ls -la /workspace/out
          DOCKEREOF


      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyx-os-iso
          path: out/*.iso
          retention-days: 7
